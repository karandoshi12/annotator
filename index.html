<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VLA Frame Annotator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d12;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e2e8;
      --muted: #7a7a90;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 60px;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 36px; }
    .header h1 { font-size: 1.9rem; color: #fff; }
    .header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }
    .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      vertical-align: middle;
      margin-left: 8px;
      letter-spacing: 0.05em;
    }

    /* ── Upload ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 60px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
      width: 100%;
      max-width: 560px;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .upload-icon { font-size: 3rem; margin-bottom: 10px; }
    .upload-area p { color: var(--muted); font-size: 0.9rem; }
    .upload-area span { color: var(--accent); font-weight: 600; }
    #file-input { display: none; }

    /* ── Controls ── */
    .controls {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls label { font-size: 0.88rem; color: var(--muted); }
    .controls input[type="number"] {
      width: 72px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    .controls input[type="number"]:focus { border-color: var(--accent); }

    .btn {
      padding: 9px 22px;
      border: none;
      border-radius: 9px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #574fd6; }
    .btn-secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-secondary:hover:not(:disabled) { background: var(--accent); color: #fff; }
    .btn-green { background: var(--accent2); color: #000; }
    .btn-green:hover:not(:disabled) { background: #00b894; }
    .btn-warn { background: var(--warn); color: #000; }

    /* ── Status / Progress ── */
    #status {
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--accent);
      min-height: 20px;
    }
    #progress-bar-wrap {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border-radius: 8px;
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.1s;
      border-radius: 8px;
    }

    /* ── Toolbar (frames section header) ── */
    .toolbar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 44px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .toolbar h2 { font-size: 1rem; color: #ccc; }
    .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Stats bar ── */
    .stats-bar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.8rem;
    }
    .stat-chip span { color: var(--accent); font-weight: 700; font-size: 1rem; margin-right: 4px; }

    /* ── Frames grid ── */
    #frames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 1200px;
    }

    /* ── Frame card ── */
    .frame-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.15s, border-color 0.2s;
      position: relative;
    }
    .frame-card:hover { transform: translateY(-2px); }
    .frame-card.annotated { border-color: var(--accent2); }
    .frame-card.annotating { border-color: var(--accent); }
    .frame-card.error-state { border-color: var(--danger); }

    .frame-img-wrap { position: relative; }
    .frame-card img { width: 100%; display: block; }

    .annotated-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent2);
      color: #000;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 20px;
      display: none;
    }
    .frame-card.annotated .annotated-badge { display: block; }

    .frame-footer {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .frame-footer .frame-label { font-size: 0.78rem; color: var(--muted); }
    .frame-footer-actions { display: flex; gap: 6px; }
    .frame-footer-actions a {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .frame-footer-actions a:hover { text-decoration: underline; }

    .annotate-frame-btn {
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 6px;
    }

    /* ── Annotation panel ── */
    .annotation-panel {
      display: none;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 0;
      overflow: hidden;
    }
    .frame-card.annotated .annotation-panel { display: block; }

    .ann-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .ann-tab {
      padding: 8px 14px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .ann-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .ann-pane { display: none; padding: 12px 14px; }
    .ann-pane.active { display: block; }

    /* Tag list */
    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .tag-blue { background: #1e3a8a33; color: #93c5fd; border: 1px solid #1e3a8a55; }
    .tag-green { background: #064e3b33; color: #6ee7b7; border: 1px solid #064e3b55; }
    .tag-yellow { background: #78350f33; color: #fcd34d; border: 1px solid #78350f55; }
    .tag-red { background: #7f1d1d33; color: #fca5a5; border: 1px solid #7f1d1d55; }
    .tag-purple { background: #312e8133; color: #c4b5fd; border: 1px solid #31208155; }
    .tag-gray { background: #1f2937; color: #9ca3af; border: 1px solid #374151; }

    /* Ann rows */
    .ann-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 5px 0;
      border-bottom: 1px solid #1a1a26;
      gap: 8px;
    }
    .ann-row:last-child { border-bottom: none; }
    .ann-key {
      font-size: 0.68rem;
      color: var(--muted);
      min-width: 120px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .ann-val {
      font-size: 0.72rem;
      color: var(--text);
      text-align: right;
      word-break: break-word;
    }
    .ann-val.mono { font-family: monospace; font-size: 0.68rem; color: #a5f3fc; }

    /* Robot instruction highlight */
    .robot-action-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 6px;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    /* Safety compliance pill */
    .compliance-pill {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }
    .comp-ok { background: #064e3b; color: #6ee7b7; }
    .comp-minor { background: #78350f; color: #fcd34d; }
    .comp-major { background: #7c2d12; color: #fdba74; }
    .comp-critical { background: #7f1d1d; color: #fca5a5; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* JSON viewer toggle */
    .json-toggle {
      font-size: 0.68rem;
      color: var(--accent);
      cursor: pointer;
      padding: 6px 0 2px;
      display: block;
    }
    .json-raw {
      display: none;
      background: #0a0a10;
      border-radius: 6px;
      padding: 10px;
      font-family: monospace;
      font-size: 0.62rem;
      color: #a5f3fc;
      overflow-x: auto;
      white-space: pre;
      max-height: 200px;
      margin-top: 6px;
    }

    /* Annotation status in annotation pane for annotate-all progress */
    #ann-status {
      font-size: 0.8rem;
      color: var(--accent2);
      margin-top: 4px;
      min-height: 18px;
    }

    canvas { display: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div class="header">
  <h1>VLA Frame Annotator <span class="badge">AI</span></h1>
  <p>Extract video frames · Annotate with Claude Vision · Export for robotics training</p>
</div>

<!-- Upload -->
<div class="upload-area" id="upload-area">
  <div class="upload-icon">🎬</div>
  <p><span>Click to upload</span> or drag & drop a video</p>
  <p style="margin-top:6px;font-size:0.78rem">MP4 · MOV · WebM · AVI</p>
  <input type="file" id="file-input" accept="video/*" />
</div>

<!-- Controls -->
<div class="controls">
  <label for="interval-input">Frame every</label>
  <input type="number" id="interval-input" value="10" min="1" max="3600" />
  <label>seconds</label>
  <button class="btn btn-primary" id="extract-btn" disabled>Extract Frames</button>
</div>

<div id="status"></div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar" style="display:none">
  <h2 id="frames-title"></h2>
  <div class="toolbar-actions">
    <button class="btn btn-secondary" id="download-all-btn" style="display:none">Download ZIP</button>
    <button class="btn btn-warn" id="annotate-all-btn" style="display:none">Annotate All Frames</button>
    <button class="btn btn-green" id="export-jsonl-btn" style="display:none">Export JSONL</button>
  </div>
</div>
<div id="ann-status"></div>

<!-- Stats -->
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="stat-chip"><span id="stat-total">0</span> Frames</div>
  <div class="stat-chip"><span id="stat-annotated">0</span> Annotated</div>
  <div class="stat-chip"><span id="stat-errors">0</span> Errors</div>
</div>

<!-- Frames grid -->
<div id="frames-grid"></div>

<canvas id="canvas"></canvas>

<script>
const API = 'http://localhost:8765/api';
const SESSION_ID = crypto.randomUUID();

const uploadArea    = document.getElementById('upload-area');
const fileInput     = document.getElementById('file-input');
const extractBtn    = document.getElementById('extract-btn');
const intervalInput = document.getElementById('interval-input');
const statusEl      = document.getElementById('status');
const progressWrap  = document.getElementById('progress-bar-wrap');
const progressBar   = document.getElementById('progress-bar');
const framesGrid    = document.getElementById('frames-grid');
const framesTitle   = document.getElementById('frames-title');
const toolbar       = document.getElementById('toolbar');
const statsBar      = document.getElementById('stats-bar');
const downloadAllBtn   = document.getElementById('download-all-btn');
const annotateAllBtn   = document.getElementById('annotate-all-btn');
const exportJsonlBtn   = document.getElementById('export-jsonl-btn');
const annStatus        = document.getElementById('ann-status');
const statTotal        = document.getElementById('stat-total');
const statAnnotated    = document.getElementById('stat-annotated');
const statErrors       = document.getElementById('stat-errors');
const canvas           = document.getElementById('canvas');
const ctx              = canvas.getContext('2d');

let videoFile = null;
let extractedFrames = [];   // [{dataUrl, timestamp, index}]
let annotationCounts = { total: 0, annotated: 0, errors: 0 };

// ── Upload ────────────────────────────────────────────────────────────────────
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) selectFile(f);
});

function selectFile(file) {
  videoFile = file;
  uploadArea.innerHTML = `
    <div class="upload-icon">✅</div>
    <p><span>${file.name}</span></p>
    <p style="margin-top:6px;font-size:0.78rem;color:var(--muted)">${(file.size/1024/1024).toFixed(2)} MB</p>
  `;
  extractBtn.disabled = false;
  statusEl.textContent = '';
  framesGrid.innerHTML = '';
  extractedFrames = [];
  toolbar.style.display = 'none';
  statsBar.style.display = 'none';
}

// ── Extraction ────────────────────────────────────────────────────────────────
extractBtn.addEventListener('click', () => {
  if (!videoFile) return;
  const interval = parseFloat(intervalInput.value);
  if (!interval || interval <= 0) { statusEl.textContent = 'Enter a valid interval.'; return; }
  extractFrames(videoFile, interval);
});

function extractFrames(file, interval) {
  extractBtn.disabled = true;
  framesGrid.innerHTML = '';
  extractedFrames = [];
  annotationCounts = { total: 0, annotated: 0, errors: 0 };
  toolbar.style.display = 'none';
  statsBar.style.display = 'none';
  statusEl.textContent = 'Loading video…';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';

  const video = document.createElement('video');
  video.preload = 'auto';
  video.muted = true;
  video.src = URL.createObjectURL(file);

  video.addEventListener('loadedmetadata', () => {
    const duration = video.duration;
    if (!isFinite(duration) || duration === 0) {
      statusEl.textContent = 'Could not read video duration.';
      extractBtn.disabled = false;
      return;
    }

    const timestamps = [];
    for (let t = 0; t < duration; t += interval) timestamps.push(parseFloat(t.toFixed(3)));

    statusEl.textContent = `Extracting ${timestamps.length} frame(s)…`;
    let index = 0;

    function captureNext() {
      if (index >= timestamps.length) { doneExtracting(timestamps.length); return; }
      video.currentTime = timestamps[index];
    }

    video.addEventListener('seeked', function onSeeked() {
      const t = timestamps[index];
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);

      extractedFrames.push({ dataUrl, timestamp: t, index });
      addFrameCard(dataUrl, t, index);

      index++;
      progressBar.style.width = Math.round((index / timestamps.length) * 100) + '%';
      statusEl.textContent = `Extracting frame ${index} of ${timestamps.length}…`;
      setTimeout(captureNext, 30);
    });

    captureNext();
  });

  video.addEventListener('error', () => {
    statusEl.textContent = 'Error loading video.';
    extractBtn.disabled = false;
  });
}

function doneExtracting(total) {
  statusEl.textContent = `${total} frame(s) extracted. Click "Annotate All Frames" to analyse with AI.`;
  progressBar.style.width = '100%';
  setTimeout(() => { progressWrap.style.display = 'none'; }, 800);
  extractBtn.disabled = false;

  annotationCounts.total = total;
  framesTitle.textContent = `${total} Frame${total !== 1 ? 's' : ''}`;
  toolbar.style.display = 'flex';
  statsBar.style.display = 'flex';
  updateStats();

  if (total > 0) {
    downloadAllBtn.style.display = 'block';
    annotateAllBtn.style.display = 'block';
  }
}

// ── Frame card ────────────────────────────────────────────────────────────────
function addFrameCard(dataUrl, timestamp, idx) {
  const card = document.createElement('div');
  card.className = 'frame-card';
  card.id = `card-${idx}`;

  card.innerHTML = `
    <div class="frame-img-wrap">
      <img src="${dataUrl}" alt="Frame ${idx+1}" />
      <div class="annotated-badge">✓ Annotated</div>
    </div>
    <div class="frame-footer">
      <span class="frame-label">#${idx+1} · ${formatTime(timestamp)}</span>
      <div class="frame-footer-actions">
        <a href="${dataUrl}" download="frame_${String(idx+1).padStart(4,'0')}_${Math.round(timestamp)}s.jpg">JPG</a>
        <button class="btn btn-secondary annotate-frame-btn" onclick="annotateFrame(${idx})">Annotate</button>
      </div>
    </div>
    <div class="annotation-panel" id="ann-panel-${idx}"></div>
  `;

  framesGrid.appendChild(card);
}

// ── Annotate all ──────────────────────────────────────────────────────────────
annotateAllBtn.addEventListener('click', async () => {
  annotateAllBtn.disabled = true;
  exportJsonlBtn.style.display = 'none';
  annStatus.textContent = '';

  for (let i = 0; i < extractedFrames.length; i++) {
    annStatus.innerHTML = `<span class="spinner"></span> Annotating frame ${i+1} of ${extractedFrames.length}…`;
    await annotateFrame(i);
  }

  annStatus.textContent = `All frames annotated. Export as JSONL for VLA training.`;
  annotateAllBtn.disabled = false;
  exportJsonlBtn.style.display = 'block';
});

// ── Annotate single frame ─────────────────────────────────────────────────────
async function annotateFrame(idx) {
  const frame = extractedFrames[idx];
  const card  = document.getElementById(`card-${idx}`);
  if (!card) return;

  card.classList.remove('annotated', 'error-state');
  card.classList.add('annotating');

  // Disable the annotate button on this card
  const btn = card.querySelector('.annotate-frame-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }

  try {
    const base64 = frame.dataUrl.replace(/^data:image\/\w+;base64,/, '');
    const resp = await fetch(`${API}/annotate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        frame_base64: base64,
        mime_type: 'image/jpeg',
        frame_index: idx,
        timestamp_seconds: frame.timestamp,
        capture_interval_seconds: parseFloat(intervalInput.value),
        video_filename: videoFile ? videoFile.name : 'unknown',
        session_id: SESSION_ID,
      }),
    });

    const data = await resp.json();

    if (data.ok && data.annotation) {
      renderAnnotation(idx, data.annotation, data.skipped_fields || []);
      card.classList.remove('annotating');
      card.classList.add('annotated');
      annotationCounts.annotated++;
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch (err) {
    card.classList.remove('annotating');
    card.classList.add('error-state');
    annotationCounts.errors++;

    const panel = document.getElementById(`ann-panel-${idx}`);
    if (panel) {
      panel.style.display = 'block';
      panel.innerHTML = `
        <div style="padding:12px;font-size:0.75rem;color:var(--danger)">
          ⚠ ${err.message}<br>
          <span style="color:var(--muted);font-size:0.65rem">
            Make sure the backend is running: <code>cd backend && python main.py</code>
          </span>
        </div>`;
    }
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Re-Annotate'; }
  updateStats();
}

// ── Render annotation ─────────────────────────────────────────────────────────
function renderAnnotation(idx, ann, skippedFields = []) {
  const panel = document.getElementById(`ann-panel-${idx}`);
  if (!panel) return;
  panel.style.display = 'block';

  const p = ann.process || {};
  const r = ann.robot_instruction || {};
  const s = ann.safety || {};
  const g = ann.scene_geometry || {};
  const h = ann.human_presence || {};
  const c = ann.scene_context || {};
  const objs = ann.objects || [];

  const compClass = {
    compliant: 'comp-ok',
    minor_violation: 'comp-minor',
    major_violation: 'comp-major',
    critical_hazard: 'comp-critical',
  }[s.overall_compliance] || 'comp-gray';

  // Build operator summary
  const ops = (h.operators || []);
  const opSummary = ops.length
    ? ops.map(o => `<b>${o.id}</b>: ${o.action_verb} (${o.action_phase})`).join('<br>')
    : '<span style="color:var(--muted)">No operators visible</span>';

  // Spatial relationships tags
  const relTags = (g.spatial_relationships || []).map(r =>
    `<span class="tag tag-blue">${r.subject} <i>${r.relation}</i> ${r.object}</span>`
  ).join('');

  // PPE tags
  const ppeTags = ops.flatMap(o => (o.ppe_worn || []).map(p =>
    `<span class="tag tag-green">${p}</span>`
  )).join('');

  // Missing PPE
  const missingTags = (s.missing_ppe || []).map(p =>
    `<span class="tag tag-red">${p}</span>`
  ).join('');

  // Hazard tags
  const hazardTags = (s.hazards_detected || []).map(h =>
    `<span class="tag tag-red" title="${h.description}">${h.type} (${h.severity})</span>`
  ).join('');

  // Quality tags
  const qualityTags = (p.quality_indicators || []).map(q =>
    `<span class="tag tag-green">${q}</span>`
  ).join('');

  // Defect tags
  const defectTags = (p.defects_visible || []).map(d =>
    `<span class="tag tag-red" title="${d.location_description}">${d.type} (${d.severity})</span>`
  ).join('');

  // Flag tags
  const flagTags = (c.annotation_flags || []).map(f =>
    `<span class="tag tag-yellow">${f}</span>`
  ).join('');

  // Objects table
  const objRows = objs.map(o => `
    <div class="ann-row">
      <span class="ann-key">${o.label || o.id}</span>
      <span class="ann-val">
        <span class="tag tag-purple">${o.category}</span>
        <span class="tag tag-gray">${o.state}</span>
        ${o.held_by ? `<span class="tag tag-blue">held by ${o.held_by}</span>` : ''}
      </span>
    </div>`).join('');

  // Depth layers
  const depthStr = (g.depth_layers || []).join(' → ');

  // Robot action params
  const paramStr = r.action_parameters
    ? Object.entries(r.action_parameters).map(([k,v]) => `${k}: ${v}`).join(' · ')
    : '';

  panel.innerHTML = `
    <div class="ann-tabs">
      <div class="ann-tab active" onclick="switchTab(${idx}, 'action', this)">Action</div>
      <div class="ann-tab" onclick="switchTab(${idx}, 'robot', this)">Robot</div>
      <div class="ann-tab" onclick="switchTab(${idx}, 'scene', this)">Scene 3D</div>
      <div class="ann-tab" onclick="switchTab(${idx}, 'objects', this)">Objects (${objs.length})</div>
      <div class="ann-tab" onclick="switchTab(${idx}, 'safety', this)">Safety</div>
      <div class="ann-tab" onclick="switchTab(${idx}, 'raw', this)">JSON</div>
    </div>

    <!-- Action tab -->
    <div class="ann-pane active" id="pane-${idx}-action">
      <div class="ann-row">
        <span class="ann-key">Operation</span>
        <span class="ann-val">${p.operation_name || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Category</span>
        <span class="ann-val"><span class="tag tag-purple">${p.operation_category || '—'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Phase</span>
        <span class="ann-val"><span class="tag tag-blue">${p.process_phase || '—'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Progress</span>
        <span class="ann-val">${p.estimated_completion_pct ?? '—'}%</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Sequence Tag</span>
        <span class="ann-val mono">${p.production_sequence_tag || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Operator</span>
        <span class="ann-val">${opSummary}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Grip / Force</span>
        <span class="ann-val">${ops[0] ? ops[0].grip_type + ' · ' + ops[0].force_estimate : '—'}</span>
      </div>
      ${qualityTags ? `<div class="ann-row"><span class="ann-key">Quality</span><span class="ann-val"><div class="tag-list">${qualityTags}</div></span></div>` : ''}
      ${defectTags ? `<div class="ann-row"><span class="ann-key">Defects</span><span class="ann-val"><div class="tag-list">${defectTags}</div></span></div>` : ''}
      ${flagTags ? `<div class="ann-row"><span class="ann-key">Flags</span><span class="ann-val"><div class="tag-list">${flagTags}</div></span></div>` : ''}
      ${skippedFields.length ? `
        <div class="ann-row" style="margin-top:6px">
          <span class="ann-key" style="color:var(--warn)">⚠ Partial</span>
          <span class="ann-val">
            <div class="tag-list">${skippedFields.map(f => `<span class="tag tag-yellow">${f} (default used)</span>`).join('')}</div>
          </span>
        </div>` : ''}
    </div>

    <!-- Robot tab -->
    <div class="ann-pane" id="pane-${idx}-robot">
      <div class="ann-row">
        <span class="ann-key">Target Action</span>
        <span class="ann-val"><span class="robot-action-badge">${r.target_action || '—'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">End Effector</span>
        <span class="ann-val"><span class="tag tag-purple">${r.end_effector_required || '—'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Target Location</span>
        <span class="ann-val">${r.target_location_description || '—'}</span>
      </div>
      ${paramStr ? `<div class="ann-row"><span class="ann-key">Parameters</span><span class="ann-val mono" style="text-align:left">${paramStr}</span></div>` : ''}
      <div class="ann-row">
        <span class="ann-key">Grasp Orientation</span>
        <span class="ann-val">${r.grasp_pose_hint ? r.grasp_pose_hint.grasp_orientation + ' (+' + r.grasp_pose_hint.pregrasp_offset_mm + 'mm)' : '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Force Profile</span>
        <span class="ann-val">${r.force_torque_profile ? `max ${r.force_torque_profile.max_force_N}N · ${r.force_torque_profile.approach_speed}` : '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Success Condition</span>
        <span class="ann-val">${r.success_condition || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Prerequisite</span>
        <span class="ann-val">${r.prerequisite_state || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Duration</span>
        <span class="ann-val">${r.estimated_duration_seconds != null ? r.estimated_duration_seconds + 's' : '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Safety Clearance</span>
        <span class="ann-val">${r.safety_clearance_mm != null ? r.safety_clearance_mm + 'mm' : '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Human Handoff</span>
        <span class="ann-val"><span class="tag ${r.human_handoff_required ? 'tag-yellow' : 'tag-green'}">${r.human_handoff_required ? 'Required' : 'Not Required'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Next Action</span>
        <span class="ann-val mono">${r.next_logical_action || '—'}</span>
      </div>
    </div>

    <!-- Scene 3D tab -->
    <div class="ann-pane" id="pane-${idx}-scene">
      <div class="ann-row">
        <span class="ann-key">Workspace Type</span>
        <span class="ann-val"><span class="tag tag-blue">${g.workspace_type || '—'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Camera Perspective</span>
        <span class="ann-val">${g.camera_perspective || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Camera Height</span>
        <span class="ann-val">${g.camera_height_estimate_m != null ? g.camera_height_estimate_m + 'm' : '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Workspace (W×D×H)</span>
        <span class="ann-val">${g.estimated_workspace_dimensions_m
          ? `${g.estimated_workspace_dimensions_m.width}m × ${g.estimated_workspace_dimensions_m.depth}m × ${g.estimated_workspace_dimensions_m.height}m`
          : '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Depth Layers</span>
        <span class="ann-val" style="text-align:left;font-size:0.68rem;color:var(--muted)">${depthStr || '—'}</span>
      </div>
      ${(g.occlusions||[]).length ? `<div class="ann-row"><span class="ann-key">Occlusions</span><span class="ann-val">${g.occlusions.join('; ')}</span></div>` : ''}
      ${relTags ? `<div style="padding:6px 0"><div style="font-size:0.68rem;color:var(--muted);margin-bottom:4px">Spatial Relationships</div><div class="tag-list">${relTags}</div></div>` : ''}
      <div class="ann-row">
        <span class="ann-key">Lighting</span>
        <span class="ann-val">${c.lighting_quality || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Image Quality</span>
        <span class="ann-val">${c.image_quality || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Environment</span>
        <span class="ann-val">${c.environment || '—'}</span>
      </div>
      ${c.free_text_notes ? `<div style="margin-top:8px;font-size:0.7rem;color:var(--muted);font-style:italic">${c.free_text_notes}</div>` : ''}
    </div>

    <!-- Objects tab -->
    <div class="ann-pane" id="pane-${idx}-objects">
      ${objRows || '<span style="color:var(--muted);font-size:0.75rem">No objects detected</span>'}
    </div>

    <!-- Safety tab -->
    <div class="ann-pane" id="pane-${idx}-safety">
      <div class="ann-row">
        <span class="ann-key">Compliance</span>
        <span class="ann-val"><span class="compliance-pill ${compClass}">${s.overall_compliance || '—'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Human Proximity</span>
        <span class="ann-val">${s.human_robot_proximity || '—'}</span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Robot Stop</span>
        <span class="ann-val"><span class="tag ${s.robot_stop_required ? 'tag-red' : 'tag-green'}">${s.robot_stop_required ? 'STOP REQUIRED' : 'Clear to proceed'}</span></span>
      </div>
      <div class="ann-row">
        <span class="ann-key">Housekeeping</span>
        <span class="ann-val">${s.housekeeping_state || '—'}</span>
      </div>
      ${ppeTags ? `<div style="padding:6px 0"><div style="font-size:0.68rem;color:var(--muted);margin-bottom:4px">PPE Observed</div><div class="tag-list">${ppeTags}</div></div>` : ''}
      ${missingTags ? `<div style="padding:6px 0"><div style="font-size:0.68rem;color:var(--danger);margin-bottom:4px">Missing PPE</div><div class="tag-list">${missingTags}</div></div>` : ''}
      ${hazardTags ? `<div style="padding:6px 0"><div style="font-size:0.68rem;color:var(--danger);margin-bottom:4px">Hazards</div><div class="tag-list">${hazardTags}</div></div>` : ''}
    </div>

    <!-- Raw JSON tab -->
    <div class="ann-pane" id="pane-${idx}-raw">
      <span class="json-toggle" onclick="toggleJson(this)">▶ Show raw JSON</span>
      <div class="json-raw">${JSON.stringify(ann, null, 2)}</div>
      <button class="btn btn-secondary" style="margin-top:8px;font-size:0.72rem;padding:5px 14px"
        onclick="copyJson(${idx})">Copy JSON</button>
    </div>
  `;

  // Store annotation on card for later copy
  panel.dataset.annotation = JSON.stringify(ann);
}

function switchTab(idx, tab, el) {
  const panel = document.getElementById(`ann-panel-${idx}`);
  panel.querySelectorAll('.ann-tab').forEach(t => t.classList.remove('active'));
  panel.querySelectorAll('.ann-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`pane-${idx}-${tab}`).classList.add('active');
}

function toggleJson(el) {
  const raw = el.nextElementSibling;
  const showing = raw.style.display === 'block';
  raw.style.display = showing ? 'none' : 'block';
  el.textContent = (showing ? '▶' : '▼') + ' Show raw JSON';
}

function copyJson(idx) {
  const panel = document.getElementById(`ann-panel-${idx}`);
  navigator.clipboard.writeText(panel.dataset.annotation || '{}');
}

// ── Export JSONL ──────────────────────────────────────────────────────────────
exportJsonlBtn.addEventListener('click', async () => {
  try {
    const resp = await fetch(`${API}/export/${SESSION_ID}`);
    if (!resp.ok) throw new Error('Export failed');
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `vla_annotations.jsonl`;
    a.click();
  } catch (e) {
    annStatus.textContent = 'Export error: ' + e.message;
  }
});

// ── Download ZIP ──────────────────────────────────────────────────────────────
downloadAllBtn.addEventListener('click', async () => {
  downloadAllBtn.textContent = 'Preparing…';
  downloadAllBtn.disabled = true;

  if (!window.JSZip) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  if (!window.saveAs) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js');

  const zip = new JSZip();
  extractedFrames.forEach((f, i) => {
    zip.file(`frame_${String(i+1).padStart(4,'0')}_${Math.round(f.timestamp)}s.jpg`,
             f.dataUrl.split(',')[1], { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  saveAs(blob, 'frames.zip');
  downloadAllBtn.textContent = 'Download ZIP';
  downloadAllBtn.disabled = false;
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function updateStats() {
  statTotal.textContent     = annotationCounts.total;
  statAnnotated.textContent = annotationCounts.annotated;
  statErrors.textContent    = annotationCounts.errors;
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}
</script>
</body>
</html>
